<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Screw Ordering System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="header-title">株式会社Hand Link</h1>
    </header>

    <nav class="nav-container">
        <button id="btn-order" class="nav-btn active" onclick="showPage('order')">発注入力</button>
        <button id="btn-history" class="nav-btn" onclick="showPage('history')">送信履歴</button>
    </nav>

    <main class="content">
        <div id="page-order" class="page active">
            <div class="order-form-container">
                <div class="input-row-group">
                    <div class="form-group flex-3">
                        <label class="form-label">ネジの仕様</label>
                        <div class="specs-inputs">
                            <div class="spec-item">
                                <p class="item-label">表面処理</p>
                                <input list="surface-list" id="spec-surface" class="input-field" placeholder="例：三価ホワイト">
                                <datalist id="surface-list">
                                    <option value="三価ホワイト">
                                    <option value="三価ブラック">
                                    <option value="ユニクロ">
                                    <option value="クロメート">
                                    <option value="ニッケル">
                                    <option value="生地">
                                    <option value="ステンレス">
                                </datalist>
                            </div>
                            <div class="spec-item">
                                <p class="item-label">サイズ</p>
                                <input type="text" id="spec-size" class="input-field" placeholder="例：M4x10">
                            </div>
                            <div class="spec-item">
                                <p class="item-label">形状</p>
                                <input type="text" id="spec-shape" class="input-field" placeholder="例：ナベ小ねじ">
                            </div>
                        </div>
                    </div>
                    <div class="form-group flex-1">
                        <label class="form-label">数量</label>
                        <input type="text" id="order-qty" class="input-field" placeholder="例:1箱">
                    </div>
                    <div class="form-group action-group">
                        <button class="btn-add" onclick="addItem()">追加</button>
                    </div>
                </div>

                <table id="order-table" class="data-table">
                    <thead>
                        <tr>
                            <th>ネジ名（表面処理・サイズ・形状）</th>
                            <th class="col-qty">数量</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>

                <div class="form-group mt-20">
                    <label class="form-label">CC担当者選択 (Cmd+クリックで複数)</label>
                    <select id="cc-list" class="select-field" multiple size="3">
                        <option value="kojocho@example.com">工場長</option>
                        <option value="kacho@example.com">課長</option>
                        <option value="shacho@example.com">社長</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">備考</label>
                    <textarea id="memo" class="textarea-field" rows="3"></textarea>
                </div>

                <button class="btn-send-mail" onclick="submitOrder()">Outlookで発注メールを作成</button>
            </div>
        </div>

        <div id="page-history" class="page">
            <div class="history-header">
                <h3 class="section-title">送信履歴</h3>
                <button class="nav-btn" onclick="loadHistory()">更新</button>
            </div>
            <table id="history-table" class="data-table">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>ネジ名</th>
                        <th>数量</th>
                        <th>状態</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
