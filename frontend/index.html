<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Screw Ordering System</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="nav">
        <button id="btn-order" class="nav-btn active" onclick="showPage('order')">発注入力</button>
        <button id="btn-history" class="nav-btn" onclick="showPage('history')">送信履歴</button>
    </div>

    <div id="page-order" class="page active">
        <div class="input-group">
            <label>発注者名</label>
            <input type="text" id="user-name" value="rabin">
        </div>

        <div class="add-row">
            <div style="flex: 3;">
                <label>ネジ名</label>
                <input type="text" id="item-name" placeholder="例：M3×10 ナベ小ねじ">
            </div>
            <div style="flex: 1;">
                <label>数量</label>
                <input type="number" id="item-qty" value="100">
            </div>
            <button class="nav-btn" style="background:#007aff; color:white;" onclick="addItem()">追加</button>
        </div>

        <table id="order-table">
            <thead><tr><th>ネジ名</th><th>数量</th></tr></thead>
            <tbody></tbody>
        </table>

        <div class="input-group" style="margin-top:20px;">
            <label>CC担当者選択 (Cmd+クリックで複数)</label>
            <select id="cc-list" multiple size="3">
                <option value="担当A">担当A</option>
                <option value="担当B">担当B</option>
                <option value="マネージャー">マネージャー</option>
            </select>
        </div>

        <div class="input-group">
            <label>備考</label>
            <textarea id="memo" rows="3"></textarea>
        </div>

        <button class="btn-send" onclick="submitOrder()">Outlookで発注メールを作成</button>
    </div>

    <div id="page-history" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h3>送信履歴</h3>
            <button class="nav-btn" onclick="loadHistory()">更新</button>
        </div>
        <table id="history-table">
            <thead><tr><th>日時</th><th>ネジ名</th><th>数量</th><th>状態</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
