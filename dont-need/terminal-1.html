<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Geolocation Sample</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .center {
       display: flex;
       justify-content: center;
       flex-direction: column;
       text-align: center;
       gap: 20px;
      }
      #map {
        width: 100%;
        height: 300px;
        background-color: #eee;
      }
    </style>
</head>
<body>
    <div class="center">
        <div class="txt-margin">
            <p>住所：<span id="address">検索中...</span></p>
        </div>
    </div>

    <script>
      const addrText = document.getElementById('address');
      const BASE_URL = "http://127.0.0.1:8000/get_address";

      const getPosition = async (position) => {
        try {
          const { latitude, longitude } = position.coords;

          // 
          const params = new URLSearchParams({
            lat: latitude,
            lng: longitude
          });

          // 自動で ?lat=xxx&lng=xxx の形に整形される
          const response = await fetch(`${BASE_URL}?${params}`);
          
          if (!response.ok) throw new Error('Network error');
          
          const data = await response.json();
          
          addrText.textContent = data;

        } catch (error) {
          console.error(error);
          addrText.textContent = "取得失敗";
        }
      };

      const notPosition = () => {
        addrText.textContent = "位置許可が必要です";
      };

      navigator.geolocation.getCurrentPosition(getPosition, notPosition);
    </script>
</body>
</html>
