<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Geolocation Sample</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .center {
       display: flex;
       justify-content: center;
       flex-direction: column;
       text-align: center;
       gap: 20px;
      }
      #map {
        width: 100%;
        height: 300px;
        background-color: #eee;
      }
    </style>
</head>
<body>
    <div class="center">
        <div class="txt-margin">
            <p>住所：<span id="address">検索中...</span></p>
        </div>
    </div>

    <script>
      const addrText = document.getElementById('address');

      // Google Maps APIの動的読み込み
      const script = document.createElement('script'); // <script>elementを作成
      script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}`; //scriptの中にsrcを追加
      script.defer = true; // 知らん
      script.async = true; // 非同期処理の適用
      document.head.appendChild(script); // headの子要素にscriptを追加

      const reverseGeocoding = (lat, lng) => {
        const geocoder = new google.maps.Geocoder();
        const latlng = { lat: lat, lng: lng };
        geocoder.geocode({ location: latlng }, (results, status) => {
          if (status === "OK") {
            if (results[0]) {
              // 最初の検索結果を住所として表示
              // 0番目が一番詳しい結果
              const result = results[0].address_components;
              let shit = "";

              // 広い住所（都道府県）から細かい方へ向かってループ
              for (let i = result.length - 1; i >= 0; i--) {
                  const item = result[i];
                  const types = item.types;

                  // 日本と郵便番号は飛ばす
                  if (types.includes("country") || types.includes("postal_code")) {
                      continue;
                  }

                  // もし「丁目」という文字がデータに含まれていたら
                  if (item.long_name.includes("丁目")) {
                      // 「丁目」までの文字だけを抜き出して、そこでループを終了する
                      const chomeIndex = item.long_name.indexOf("丁目");
                      shit += item.long_name.substring(0, chomeIndex + 2); // 「丁目」の2文字分含める
                      break; 
                  }

                  // 丁目が出てくる前までは、普通に足していく
                  shit += item.long_name + " ";
              }

                  addrText.textContent = shit.trim();
            } else {
              addrText.textContent = "住所が見つかりませんでした";
            }
          } else {
            addrText.textContent = "ジオコーディング失敗: " + status;
          }
        });
      }

      const getlocation = () => {
        if (!navigator.geolocation) {
          addrText.textContent = "お使いのブラウザは位置情報に対応していません";
          return;
        }
        
        navigator.geolocation.getCurrentPosition(position => {
          const { latitude, longitude } = position.coords;
          
          // 逆ジオコーディングの実行
          reverseGeocoding(latitude, longitude);

        }, error => {
          console.error("位置情報の取得に失敗しました", error);
          addrText.textContent = "位置情報の取得を許可してください";
        });
      }


      // API読み込み完了後に実行
      window.onload = getlocation;
    </script>
</body>
</html>
